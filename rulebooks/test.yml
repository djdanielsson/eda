---
- name: Capture POSTs
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000
  rules:
    - name: Launch Demo Job
      condition:
        all:
          - event.payload.assignment_group == 'ce2ae2ae47b681dc723383c2846d43ba'
          - event.payload.short_description is regex("\/var\/log", ignorecase=true)
      action:
        run_job_template:
          name: Demo Job Template
          organization: Default

    - name: Test
      condition: event.payload is defined
      action:
        debug:
...
